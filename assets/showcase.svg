  <text x="1236" y="52" fill="#6e7681" font-size="15" text-anchor="end">autovram v1.1.0</text><text x="56" y="118" font-size="19"><tspan fill="#3fb950">gsoc@katana</tspan><tspan fill="#8b949e">:</tspan><tspan fill="#58a6ff">~/fs25/auto-vram</tspan><tspan fill="#8b949e">$ </tspan><tspan fill="#e6edf3">autovram --auto</tspan></text><text x="56" y="164" fill="#c9d1d9" font-size="18">&#9656; detect GPU</text><text x="640" y="164" fill="#e6edf3" font-size="18">RTX 4060 found</text><text x="56" y="200" fill="#c9d1d9" font-size="18">&#9656; query total VRAM</text><text x="640" y="200" fill="#39c5cf" font-size="18">8192 MB</text><text x="56" y="236" fill="#c9d1d9" font-size="18">&#9656; FS25 default cap</text><text x="640" y="236" fill="#6e7681" font-size="18">~4096 MB  (capped)</text><text x="56" y="272" fill="#c9d1d9" font-size="18">&#9656; write gameSettings.xml</text><rect x="640" y="255" width="50" height="24" rx="5" fill="#238636"/><text x="665.0" y="272" fill="#e6edf3" text-anchor="middle" font-size="14" font-weight="700">OK</text><text x="56" y="322" fill="#8b949e" font-size="15" letter-spacing="1">// FS25 ignores half your card &#8212; lifted</text><text x="56" y="384" font-size="44" font-weight="800"><tspan fill="#f85149">~4 GB</tspan><tspan fill="#6e7681" font-size="32">  &#9472;&#9472;&#9654;  </tspan><tspan fill="#3fb950">8 GB</tspan><tspan fill="#8b949e" font-size="21" font-weight="600">  usable VRAM</tspan></text><text x="56" y="436" font-size="19"><tspan fill="#3fb950" font-weight="700">&#10003; NVIDIA &#183; AMD &#183; Intel &#8212; auto-detected</tspan></text><text x="56" y="466" font-size="16" fill="#6e7681">no config editing, no guesswork. installs and runs.</text><text x="56" y="512" font-size="19"><tspan fill="#3fb950">gsoc@katana</tspan><tspan fill="#8b949e">:</tspan><tspan fill="#58a6ff">~/fs25/auto-vram</tspan><tspan fill="#8b949e">$ </tspan></text><rect x="470" y="497" width="11" height="20" fill="#3fb950"/><line x1="24" y1="566" x2="1256" y2="566"